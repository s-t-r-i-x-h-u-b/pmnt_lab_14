apiVersion: apps/v1
kind: Deployment
metadata:
  name: analysis-api
  labels:
    app: analysis-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analysis-api
  template:
    metadata:
      labels:
        app: analysis-api
    spec:
      containers:
        - name: api
          image: analysis:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          env:
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: KAFKA_BROKERS
              value: "kafka:9092"
            - name: FLIGHT_ENDPOINT
              value: "grpc://collector:5005"
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: analysis-api
spec:
  selector:
    app: analysis-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  labels:
    app: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: analysis:latest
          imagePullPolicy: IfNotPresent
          command:
            - streamlit
            - run
            - dashboard/app.py
            - --server.port=8501
            - --server.address=0.0.0.0
          env:
            - name: API_URL
              value: "http://analysis-api:8000"
          ports:
            - containerPort: 8501
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30501
