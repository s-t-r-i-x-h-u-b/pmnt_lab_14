apiVersion: v1
kind: Secret
metadata:
  name: openaq-secret
type: Opaque
stringData:
  api-key: ""   # Set your OpenAQ API key here
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  labels:
    app: collector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
      annotations:
        # Prometheus pod-discovery annotations — scraped by prometheus.yaml ConfigMap.
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8080"
        prometheus.io/path:   "/metrics/prometheus"
    spec:
      containers:
        - name: collector
          image: collector:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ETCD_ENDPOINTS
              value: "http://etcd:2379"
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: FETCH_INTERVAL
              value: "5m"
            - name: WINDOW_DURATION
              value: "60s"
            - name: WINDOW_MAX_SIZE
              value: "500"
            - name: PUBLISH_RAW
              value: "true"
            - name: METRICS_ADDR
              value: ":8080"
            - name: FLIGHT_ADDR
              value: ":5005"
            - name: FLIGHT_STORE_LEN
              value: "200"
            - name: INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPENAQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openaq-secret
                  key: api-key
                  optional: true
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 5005
              name: flight
          resources:
            requests:
              cpu:    100m
              memory: 128Mi
            limits:
              cpu:    500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /shards
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 5
---
# ClusterIP service — internal access for NATS, Flight, and KEDA metrics-api polling.
apiVersion: v1
kind: Service
metadata:
  name: collector
spec:
  selector:
    app: collector
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
    - name: flight
      port: 5005
      targetPort: 5005
---
# Headless service — lets Prometheus discover and scrape each pod individually.
apiVersion: v1
kind: Service
metadata:
  name: collector-headless
  labels:
    app: collector
spec:
  clusterIP: None
  selector:
    app: collector
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
