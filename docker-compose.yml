version: "3.9"

services:
  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.14
    command:
      - /usr/local/bin/etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd0=http://etcd:2380
      - --initial-cluster-token=air-quality
      - --initial-cluster-state=new
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd-data
    healthcheck:
      test: ["/usr/local/bin/etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector-1:
    build:
      context: ./collector
      dockerfile: ../docker/Dockerfile.collector
    environment:
      ETCD_ENDPOINTS: http://etcd:2379
      NATS_URL: nats://nats:4222
      OPENAQ_API_KEY: ${OPENAQ_API_KEY:-}
      FETCH_INTERVAL: ${FETCH_INTERVAL:-5m}
      WINDOW_DURATION: ${WINDOW_DURATION:-60s}
      WINDOW_MAX_SIZE: ${WINDOW_MAX_SIZE:-500}
      PUBLISH_RAW: "true"
      INSTANCE_ID: collector-1
      METRICS_ADDR: ":8080"
      FLIGHT_ADDR: ":5005"
      FLIGHT_STORE_LEN: "200"
    ports:
      - "8081:8080"   # metrics/shards HTTP
      - "5005:5005"   # Arrow Flight gRPC (primary)
    depends_on:
      etcd:
        condition: service_healthy
      nats:
        condition: service_healthy

  collector-2:
    build:
      context: ./collector
      dockerfile: ../docker/Dockerfile.collector
    environment:
      ETCD_ENDPOINTS: http://etcd:2379
      NATS_URL: nats://nats:4222
      OPENAQ_API_KEY: ${OPENAQ_API_KEY:-}
      FETCH_INTERVAL: ${FETCH_INTERVAL:-5m}
      WINDOW_DURATION: ${WINDOW_DURATION:-60s}
      WINDOW_MAX_SIZE: ${WINDOW_MAX_SIZE:-500}
      PUBLISH_RAW: "true"
      INSTANCE_ID: collector-2
      METRICS_ADDR: ":8080"
      FLIGHT_ADDR: ":5005"
      FLIGHT_STORE_LEN: "200"
    ports:
      - "8082:8080"
      - "5006:5005"   # Arrow Flight gRPC
    depends_on:
      etcd:
        condition: service_healthy
      nats:
        condition: service_healthy

  collector-3:
    build:
      context: ./collector
      dockerfile: ../docker/Dockerfile.collector
    environment:
      ETCD_ENDPOINTS: http://etcd:2379
      NATS_URL: nats://nats:4222
      OPENAQ_API_KEY: ${OPENAQ_API_KEY:-}
      FETCH_INTERVAL: ${FETCH_INTERVAL:-5m}
      WINDOW_DURATION: ${WINDOW_DURATION:-60s}
      WINDOW_MAX_SIZE: ${WINDOW_MAX_SIZE:-500}
      PUBLISH_RAW: "true"
      INSTANCE_ID: collector-3
      METRICS_ADDR: ":8080"
      FLIGHT_ADDR: ":5005"
      FLIGHT_STORE_LEN: "200"
    ports:
      - "8083:8080"
      - "5007:5005"   # Arrow Flight gRPC
    depends_on:
      etcd:
        condition: service_healthy
      nats:
        condition: service_healthy

  analysis-api:
    build:
      context: ./analysis
      dockerfile: ../docker/Dockerfile.analysis
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      NATS_URL: nats://nats:4222
      FLIGHT_ENDPOINT: grpc://collector-1:5005  # connect to collector-1 Flight server
    ports:
      - "8000:8000"
    depends_on:
      nats:
        condition: service_healthy
      collector-1:
        condition: service_started

  dashboard:
    build:
      context: ./analysis
      dockerfile: ../docker/Dockerfile.analysis
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    environment:
      API_URL: http://analysis-api:8000
    ports:
      - "8501:8501"
    depends_on:
      - analysis-api

volumes:
  etcd-data:
